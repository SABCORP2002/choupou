<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detection Image - WasteAI</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #f4f7fb; color: #1d2735; }
    .card { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    button { padding: 10px 16px; border: none; border-radius: 8px; background: #0b6ed0; color: #fff; cursor: pointer; }
    .result { margin-top: 16px; background: #eef4ff; border-radius: 8px; padding: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Detection YOLO sur image</h1>
    <p>Utilisateur: {{ email }}</p>
    <form id="detectForm">
      <input type="file" id="file" name="file" accept="image/*" required>
      <button type="submit">Lancer la detection</button>
    </form>
    <div id="result" class="result">En attente...</div>
  </div>

  <script>
    const form = document.getElementById('detectForm');
    const result = document.getElementById('result');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const fileInput = document.getElementById('file');
      if (!fileInput.files.length) {
        result.textContent = 'Veuillez choisir une image.';
        return;
      }
      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      result.textContent = 'Traitement en cours...';
      try {
        const response = await fetch('/api/yolo/detect-image', {
          method: 'POST',
          body: formData
        });
        const payload = await response.json();
        result.textContent = JSON.stringify(payload, null, 2);
      } catch (err) {
        result.textContent = `Erreur: ${err}`;
      }
    });
  </script>
</body>
</html>
